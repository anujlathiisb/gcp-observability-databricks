bundle:
  name: gcp-cost-observability

include:
  - resources/*.yml
  - local_overrides.yml  # Generated by scripts/deploy.py — sets workspace.host per target

variables:
  catalog:
    description: "Unity Catalog catalog name for observability tables"
    default: "fevm_gcp_classic_anuj"
  schema:
    description: "Schema name for observability tables"
    default: "observability"
  cloud:
    description: "Cloud filter for system.billing.usage (GCP / AWS / AZURE)"
    default: "GCP"
  region:
    description: "Cloud region for VM list-price lookups (e.g. us-central1, asia-south1)"
    default: "us-central1"
  warehouse_id:
    description: "SQL warehouse ID for dashboard and queries"
    lookup:
      warehouse: "Serverless Starter Warehouse"
  daily_threshold_dollars:
    description: "Daily DBU cost threshold in USD for alerts"
    default: "1000"
  threshold_percentages:
    description: "Comma-separated alert tier percentages (default: 25,50,75,90,100)"
    default: "25,50,75,90,100"
  alert_recipient_emails:
    description: "Comma-separated email addresses logged in alert_config (shown on dashboard)"
    default: ""
  alert_emails_list:
    description: "YAML list of email addresses that receive the actual alert email"
    type: complex
    default: []
  notification_destination_id:
    description: "Optional Databricks workspace notification destination ID (legacy hook)"
    default: ""
  gcp_billing_api_key_secret_scope:
    description: "Secret scope containing GCP Cloud Billing API key (optional; live pricing)"
    default: ""
  gcp_billing_api_key_secret_name:
    description: "Secret name for GCP Cloud Billing API key (optional; live pricing)"
    default: ""
  alert_schedule_cron:
    description: "Cron expression for alert checker (IST)"
    default: "0 0 * * * ?"
  etl_schedule_cron:
    description: "Cron expression for daily ETL (IST)"
    default: "0 0 6 * * ?"
  schedule_timezone:
    description: "Timezone for scheduled jobs. Default is Asia/Kolkata (IST)."
    default: "Asia/Kolkata"

sync:
  exclude:
    - ".venv"
    - ".git"
    - "__pycache__"
    - "*.pyc"
    - ".databricks"
    - ".DS_Store"
    - "scripts"
    - "*.template"
    - "config.yml"
    - "local_overrides.yml"

# Workspace host is set per target in local_overrides.yml (generated by deploy.py).
# DABs requires workspace.host to be a literal string — it cannot be a variable.
targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://8259559727960544.4.gcp.databricks.com
      root_path: /Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

  staging:
    workspace:
      host: https://8259559727960544.4.gcp.databricks.com
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    variables:
      schema: "observability_staging"

  prod:
    mode: production
    workspace:
      host: https://8259559727960544.4.gcp.databricks.com
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    # Note: the `admins` group has implicit CAN_MANAGE on all workspace resources
    # and Databricks rejects attempts to grant it explicitly. Keep `users: CAN_VIEW`
    # so everyone can read the dashboard.
    permissions:
      - group_name: "users"
        level: CAN_VIEW
